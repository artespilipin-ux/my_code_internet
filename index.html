<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#000"><title>Зеркало — интерактивное демо</title><style>:root{--v:#000;--w:#fff;--a:#999;--i:#8052ff;--s:#ffb829;--g:#15846e;--l:#ffffff1a}*{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;background:#000;color:#fff;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:300}button,textarea{font:inherit;color:inherit}canvas{position:fixed;inset:0;z-index:0;width:100%;height:100%;pointer-events:none}.glow{position:fixed;inset:0;z-index:1;background:radial-gradient(circle at 72% 25%,#8052ff12,transparent 28%),radial-gradient(circle at 83% 68%,#ffb8290b,transparent 26%);pointer-events:none}.app{position:relative;z-index:2;height:100%;display:grid;grid-template-columns:278px 1fr}.side{padding:24px 18px 20px 24px;border-right:1px solid #ffffff10;background:linear-gradient(90deg,#000 0,#000e 80%,#0009);backdrop-filter:blur(18px);display:flex;flex-direction:column}.brandrow{display:flex;align-items:center;justify-content:space-between;height:42px;margin-bottom:26px}.brand{display:flex;align-items:center;gap:11px;font-weight:650;letter-spacing:.02em}.mark{position:relative;width:23px;height:23px}.mark:before,.mark:after{content:"";position:absolute;clip-path:polygon(0 0,100% 50%,0 100%)}.mark:before{inset:0 5px 0 0;background:linear-gradient(145deg,var(--i),#bd8dff 60%,var(--g));filter:drop-shadow(0 0 14px #8052ff99)}.mark:after{width:11px;height:11px;right:0;bottom:0;transform:rotate(180deg);background:var(--s)}.icon{border:0;background:transparent;border-radius:50%;padding:8px;cursor:pointer;color:#777}.icon:hover{background:#ffffff0c;color:#fff}.new{height:46px;border:0;border-radius:999px;background:var(--i);font-size:11px;font-weight:750;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 40px #8052ff33}.new:hover{filter:brightness(1.08)}.label{margin:30px 9px 12px;color:#777;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}.history{overflow:auto}.item{position:relative;width:100%;text-align:left;border:0;background:transparent;color:#888;border-radius:17px;padding:12px 34px 12px 13px;margin:2px 0;cursor:pointer}.item:hover,.item.active{background:#8052ff1d;color:#fff}.item strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px;font-weight:450}.item span{display:block;margin-top:5px;color:#666;font-size:10px}.del{position:absolute;right:8px;top:10px;border:0;background:none;color:#555;cursor:pointer}.profile{margin-top:auto;display:flex;gap:11px;align-items:center;padding:10px 8px;color:#777;font-size:10px}.avatar{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#ffffff12;color:#aaa;font-size:10px;font-weight:650}.profile strong{display:block;color:#ddd;font-size:12px;font-weight:500;margin-bottom:3px}.main{min-width:0;height:100%;display:grid;grid-template-rows:74px 1fr auto;background:linear-gradient(#0004,#000b)}.top{display:flex;align-items:center;justify-content:space-between;padding:0 34px;background:linear-gradient(#000c,transparent)}.meta strong{display:block;font-size:13px;font-weight:520}.statusline{display:flex;gap:7px;align-items:center;color:#707070;font-size:10px;margin-top:5px}.dot{width:6px;height:6px;border-radius:50%;background:#58c69f;box-shadow:0 0 12px #58c69fcc}.chip{border:0;border-radius:999px;background:#15846e19;color:#75bcae;padding:9px 12px;font-size:10px;cursor:pointer}.scroll{overflow:auto;scroll-behavior:smooth}.chat{width:min(880px,calc(100% - 56px));min-height:100%;margin:auto;padding:50px 0 48px}.date{text-align:center;color:#5d5d5d;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:48px}.hero{max-width:730px;margin-bottom:64px}.eyebrow{display:flex;align-items:center;gap:9px;color:var(--s);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px}.eyebrow:before{content:"";width:16px;height:1px;background:currentColor}.hero h1{font-size:clamp(43px,5.5vw,78px);line-height:.98;letter-spacing:-.055em;font-weight:370;margin:0}.hero p{max-width:580px;color:#bcbcbc;font-size:16px;line-height:1.58;margin:24px 0 0}.quick{display:flex;flex-wrap:wrap;gap:9px;margin-top:25px}.quick button{border:1px solid #ffffff18;background:#ffffff08;color:#aaa;border-radius:999px;padding:10px 13px;cursor:pointer}.message{display:grid;grid-template-columns:34px minmax(0,1fr);gap:16px;margin:0 0 42px;animation:enter .35s ease both}.message.user{grid-template-columns:minmax(0,1fr) 34px;width:min(680px,88%);margin-left:auto}.message.user .body{order:1}.message.user .avatar{order:2;background:#8052ff22;color:#bda8ff}.mirror:before{content:"";width:15px;height:15px;clip-path:polygon(0 0,100% 50%,0 100%);background:linear-gradient(145deg,var(--i),#b684ff,var(--g))}.head{display:flex;align-items:center;gap:9px;min-height:24px;margin-bottom:8px}.head strong{font-size:12px;font-weight:550}.head time{color:#5e5e5e;font-size:10px}.body{color:#ececec;font-size:15px;line-height:1.68;min-width:0;white-space:pre-wrap}.body p{margin:0 0 16px}.note{margin-top:17px;padding:17px 19px;border-left:1px solid var(--s);background:#ffb8290b;color:#d5d5d5;white-space:normal}.tag{display:block;color:var(--s);font-size:9px;font-weight:750;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}.sources{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.source{border:1px solid #ffffff14;border-radius:999px;padding:7px 10px;color:#777;font-size:10px}.typing{display:inline-flex;gap:5px;padding:9px 0}.typing i{width:6px;height:6px;background:#777;border-radius:50%;animation:b 1s infinite}.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}.composerwrap{padding:0 24px 22px;background:linear-gradient(transparent,#000 34%)}.composer{max-width:880px;margin:auto}.shell{display:flex;align-items:flex-end;gap:8px;border:1px solid #ffffff1b;border-radius:26px;background:#0b0b0ee8;backdrop-filter:blur(18px);padding:8px 9px 8px 13px;box-shadow:0 18px 60px #000}.shell textarea{flex:1;min-height:42px;max-height:140px;resize:none;background:transparent;border:0;outline:0;color:#fff;padding:11px 4px;font-size:14px}.attach,.send{width:42px;height:42px;border-radius:50%;border:0;cursor:pointer}.attach{background:transparent;color:#777}.send{background:var(--i);font-size:20px}.send:disabled{background:#29292d;color:#666}.hint{text-align:center;color:#535353;font-size:10px;margin-top:8px}.memory{display:none;position:fixed;z-index:8;right:20px;top:84px;width:min(370px,calc(100% - 40px));max-height:calc(100% - 108px);overflow:auto;border:1px solid #ffffff18;border-radius:24px;background:#09090df4;backdrop-filter:blur(22px);padding:20px;box-shadow:0 30px 90px #000}.memory.open{display:block}.memory h3{margin:0 0 16px;font-size:17px}.memorycard{border:1px solid #ffffff12;border-radius:16px;padding:14px;margin:9px 0;color:#bbb;font-size:13px;line-height:1.5}.mobile{display:none}@keyframes enter{from{opacity:0;transform:translateY(9px)}}@keyframes b{0%,100%{opacity:.25;transform:none}50%{opacity:1;transform:translateY(-3px)}}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:10;inset:0 auto 0 0;width:278px;transform:translateX(-100%);transition:.25s}.side.open{transform:none}.mobile{display:inline-block}.top{padding:0 14px}.chat{width:calc(100% - 30px);padding-top:24px}.hero h1{font-size:47px}.composerwrap{padding:0 10px 13px}.desktop{display:none}}</style></head><body><canvas id="space"></canvas><div class="glow"></div><div class="app"><aside class="side" id="side"><div class="brandrow"><div class="brand"><span class="mark"></span>ЗЕРКАЛО</div><button class="icon" id="closeSide">←</button></div><button class="new" id="newChat">＋ Новый разговор</button><div class="label">Недавние</div><div class="history" id="history"></div><div class="profile"><div class="avatar">ВИ</div><div><strong>Виталий Иванов</strong>Личная память включена</div></div></aside><main class="main"><header class="top"><div style="display:flex;align-items:center;gap:10px"><button class="icon mobile" id="menu">☰</button><div class="meta"><strong id="title">Новый разговор</strong><div class="statusline"><span class="dot"></span>память активна</div></div></div><button class="chip" id="memoryBtn">Приватный режим</button></header><section class="scroll" id="scroll"><div class="chat" id="chat"></div></section><footer class="composerwrap"><div class="composer"><div class="shell"><button class="attach" id="voice">◉</button><textarea id="input" rows="1" placeholder="Расскажи, что сейчас происходит…"></textarea><button class="send" id="send" disabled>→</button></div><div class="hint">Зеркало может ошибаться. Важные решения лучше проверять по фактам.</div></div></footer></main></div><aside class="memory" id="memory"><button class="icon" style="float:right" id="closeMemory">✕</button><h3>Память пользователя</h3><div id="memoryList"></div></aside><script>const $=s=>document.querySelector(s),K='mirror_polished_demo';let st=JSON.parse(localStorage.getItem(K)||'null')||{active:null,chats:[],memory:['Вам важно соединять деньги, смысл и пользу людям.','Перед публичными действиями часто появляется стремление довести результат до идеала.','Больше энергии появляется в стратегических задачах с ясным результатом.']};const save=()=>localStorage.setItem(K,JSON.stringify(st)),id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6),active=()=>st.chats.find(c=>c.id===st.active),esc=s=>s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),time=()=>new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});function create(){let c={id:id(),title:'Новый разговор',created:Date.now(),messages:[]};st.chats.unshift(c);st.active=c.id;save();render();$('#side').classList.remove('open')}function hero(){return `<div class="date">Сегодня</div><section class="hero"><div class="eyebrow">Разговор с собой</div><h1>Что сегодня стоит увидеть яснее?</h1><p>Опишите ситуацию своими словами. «Зеркало» поможет отделить факты от интерпретаций, увидеть повторяющийся сценарий и выбрать следующий честный шаг.</p><div class="quick"><button>Я откладываю важное решение</button><button>Не понимаю, куда уходит энергия</button><button>Мне сложно начать разговор</button></div></section>`}function mh(m){return m.role==='user'?`<article class="message user"><div class="body"><div class="head"><time>${m.t}</time><strong>Вы</strong></div>${esc(m.text)}</div><div class="avatar">ВИ</div></article>`:`<article class="message"><div class="avatar mirror"></div><div class="body"><div class="head"><strong>Зеркало</strong><time>${m.t}</time></div>${m.html}</div></article>`}function render(){let c=active();$('#title').textContent=c?.title||'Новый разговор';$('#history').innerHTML=st.chats.map(x=>`<button class="item ${x.id===st.active?'active':''}" data-id="${x.id}"><strong>${esc(x.title)}</strong><span>${new Date(x.created).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</span><i class="del" data-del="${x.id}">×</i></button>`).join('');document.querySelectorAll('[data-id]').forEach(x=>x.onclick=e=>{if(e.target.dataset.del)return;st.active=x.dataset.id;save();render();$('#side').classList.remove('open')});document.querySelectorAll('[data-del]').forEach(x=>x.onclick=e=>{e.stopPropagation();st.chats=st.chats.filter(c=>c.id!==x.dataset.del);if(st.active===x.dataset.del)st.active=st.chats[0]?.id||null;save();render()});$('#chat').innerHTML=(!c||!c.messages.length?hero():'')+(c?c.messages.map(mh).join(''):'');document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{$('#input').value=b.textContent;$('#send').disabled=false;send()});$('#memoryList').innerHTML=st.memory.map(x=>`<div class="memorycard">${esc(x)}</div>`).join('');setTimeout(()=>$('#scroll').scrollTop=$('#scroll').scrollHeight,10)}function reply(t){let s=t.toLowerCase(),a,o,n;if(/страх|боюсь|опасаюсь/.test(s)){a='Похоже, вместе с задачей вы как будто отправляете на проверку и собственную компетентность.';o='Раньше перед заметными действиями уже появлялся похожий цикл: высокая планка → откладывание → потеря энергии.';n='Сделайте действие обратимым: отправьте рабочую версию одному человеку и попросите ответить только на один вопрос.'}else if(/энерг|устал|сил/.test(s)){a='В вашем описании слышится не только усталость, но и сопротивление тому, как сейчас распределено внимание.';o='Больше энергии обычно появляется там, где есть ясная диагностика, смысл и видимый результат.';n='Выпишите три текущих дела и выберите одно, которое можно отменить, делегировать или сократить вдвое.'}else if(/разговор|отнош|партн|жена|муж/.test(s)){a='Кажется, вы одновременно хотите быть услышанным и пытаетесь заранее управлять реакцией другого человека.';o='В напряжённых разговорах стремление быстро исправить ситуацию иногда мешает сначала назвать чувство и потребность.';n='Начните с фразы: «Мне важно не победить в разговоре, а понять друг друга. Сейчас я чувствую…»'}else{a='Я слышу здесь две части: фактическую ситуацию и значение, которое вы ей придаёте. Их полезно временно разделить.';o='В памяти повторяется стремление сначала получить полную ясность и только потом действовать. Иногда ясность приходит после первого шага.';n='Запишите отдельно: что точно произошло, что вы предполагаете и какое минимальное действие даст новые данные.'}return `<p>${a}</p><div class="note"><span class="tag">Наблюдение из памяти</span>${o}</div><p>Это не окончательный вывод, а гипотеза для проверки. Что в ней откликается, а что кажется неверным?</p><div class="note"><span class="tag">Следующий шаг</span>${n}</div><div class="sources"><span class="source">● Текущий диалог</span><span class="source">● Личная память</span></div>`}async function send(){let q=$('#input'),t=q.value.trim();if(!t)return;let c=active();if(!c){create();c=active()}if(!c.messages.length)c.title=t.length>38?t.slice(0,38)+'…':t;c.messages.push({role:'user',text:t,t:time()});q.value='';q.style.height='auto';$('#send').disabled=true;save();render();let z=document.createElement('article');z.className='message';z.innerHTML='<div class="avatar mirror"></div><div class="body"><div class="head"><strong>Зеркало</strong><time>сейчас</time></div><span class="typing"><i></i><i></i><i></i></span></div>';$('#chat').appendChild(z);$('#scroll').scrollTop=$('#scroll').scrollHeight;await new Promise(r=>setTimeout(r,1100+Math.random()*700));z.remove();c.messages.push({role:'assistant',html:reply(t),t:time()});if(c.messages.length===2&&t.length>35)st.memory.unshift('Недавняя тема: '+t.slice(0,90));st.memory=st.memory.slice(0,7);save();render()}$('#newChat').onclick=create;$('#send').onclick=send;$('#input').oninput=e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,140)+'px';$('#send').disabled=!e.target.value.trim()};$('#input').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};$('#menu').onclick=()=>$('#side').classList.add('open');$('#closeSide').onclick=()=>$('#side').classList.remove('open');$('#memoryBtn').onclick=()=>$('#memory').classList.add('open');$('#closeMemory').onclick=()=>$('#memory').classList.remove('open');$('#voice').onclick=()=>{let R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R)return alert('Голосовой ввод не поддерживается этим браузером.');let r=new R;r.lang='ru-RU';r.onresult=e=>{$('#input').value=e.results[0][0].transcript;$('#send').disabled=false};r.start()};const cv=$('#space'),cx=cv.getContext('2d');let W,H,P=[],A=[],pointer={x:0,y:0};const pal=['#8052ff','#ffb829','#15846e','#b06aff','#5e8cff','#f2f2f2','#d35da5'];function resize(){W=innerWidth;H=innerHeight;let d=Math.min(devicePixelRatio||1,2);cv.width=W*d;cv.height=H*d;cx.setTransform(d,0,0,d,0,0);P=[];A=[];let n=Math.min(620,Math.max(280,W*H/2500));for(let i=0;i<n;i++){let l=Math.random()<.5?-1:1,a=Math.random()*6.28,r=Math.sqrt(Math.random()),sx=Math.min(W*.24,360),sy=Math.min(H*.19,190),mx=W*(W>900?.73:.56),my=H*(W>900?.30:.25);P.push({x:mx+l*sx*.23+Math.cos(a)*sx*r,y:my+Math.sin(a)*sy*r,p:Math.random()*6.28,c:pal[Math.random()*pal.length|0],s:.8+Math.random()*1.8,r:Math.random()*6.28,o:.18+Math.random()*.55})}for(let i=0;i<70;i++)A.push({x:Math.random()*W,y:Math.random()*H,p:Math.random()*6.28,c:pal[Math.random()*pal.length|0],s:1+Math.random()*3,r:Math.random()*6.28,o:.05+Math.random()*.2})}function tri(x,y,s,r,c,o){cx.save();cx.translate(x,y);cx.rotate(r);cx.beginPath();cx.moveTo(0,-s);cx.lineTo(s*.9,s*.65);cx.lineTo(-s*.9,s*.65);cx.closePath();cx.strokeStyle=c;cx.globalAlpha=o;cx.lineWidth=.75;cx.stroke();cx.restore()}let T=0;function anim(){T+=.006;cx.clearRect(0,0,W,H);cx.globalCompositeOperation='lighter';A.forEach(p=>tri(p.x+Math.sin(T+p.p)*5,p.y+Math.cos(T*.8+p.p)*6,p.s,p.r+T*.18,p.c,p.o));let mx=pointer.x||W*.72,my=pointer.y||H*.3;P.forEach(p=>{let dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy)||1,k=Math.max(0,90-d)/90;tri(p.x+dx/d*k*8+Math.sin(T*1.8+p.p)*1.8,p.y+dy/d*k*8+Math.cos(T*1.5+p.p)*1.5,p.s,p.r+T*.22,p.c,p.o)});cx.globalCompositeOperation='source-over';requestAnimationFrame(anim)}addEventListener('resize',resize);addEventListener('pointermove',e=>pointer={x:e.clientX,y:e.clientY});resize();anim();if(!st.chats.length)create();else render();</script></body></html>
