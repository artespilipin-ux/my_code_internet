<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Зеркало — интерактивное демо</title><style>*{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;background:#000;color:#fff;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:300}.app{height:100%;display:grid;grid-template-columns:280px 1fr;position:relative;z-index:2}.side{padding:22px;border-right:1px solid #ffffff14;background:#050507ed;display:flex;flex-direction:column;min-width:0}.brand{display:flex;align-items:center;gap:12px;font-weight:700}.mark{width:23px;height:23px;clip-path:polygon(0 0,100% 50%,0 100%);background:linear-gradient(145deg,#8052ff,#c08cff,#15846e);filter:drop-shadow(0 0 15px #8052ff99)}button{font:inherit}.new{margin-top:26px;border:0;border-radius:30px;background:#8052ff;color:#fff;padding:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}.label{margin:26px 8px 10px;color:#777;font-size:10px;letter-spacing:.15em;text-transform:uppercase}.list{overflow:auto}.item{position:relative;padding:13px 36px 13px 13px;border-radius:16px;color:#999;font-size:13px;margin:3px 0;cursor:pointer}.item:hover,.item.active{background:#8052ff1e;color:#fff}.item small{display:block;color:#666;margin-top:5px}.del{position:absolute;right:9px;top:11px;border:0;background:none;color:#666;cursor:pointer;font-size:15px}.profile{margin-top:auto;color:#999;font-size:12px;padding-top:16px}.main{height:100%;display:grid;grid-template-rows:70px 1fr auto;background:linear-gradient(#0004,#000c)}.top{display:flex;justify-content:space-between;align-items:center;padding:0 30px;border-bottom:1px solid #ffffff08}.top strong{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topActions{display:flex;gap:8px}.pill{border:1px solid #ffffff14;background:#ffffff08;color:#aaa;padding:8px 11px;border-radius:20px;font-size:10px;cursor:pointer}.status{color:#71bbaa;background:#15846e1c;border-color:#15846e33}.scroll{overflow:auto;scroll-behavior:smooth}.chat{width:min(860px,calc(100% - 48px));margin:auto;padding:42px 0 60px}.hero{padding:18px 0 24px}.eyebrow{color:#ffb829;font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:700}.hero h1{font-size:clamp(42px,5.5vw,72px);line-height:.98;letter-spacing:-.055em;font-weight:350;margin:16px 0 22px;max-width:720px}.hero p{color:#aaa;max-width:600px;line-height:1.6}.quick{display:flex;flex-wrap:wrap;gap:9px;margin-top:24px}.quick button{border:1px solid #ffffff18;background:#ffffff08;color:#bbb;border-radius:20px;padding:10px 13px;cursor:pointer}.msg{display:grid;grid-template-columns:35px 1fr;gap:16px;margin-top:42px;max-width:760px;animation:in .25s ease}.msg.user{grid-template-columns:1fr 35px;margin-left:auto;max-width:650px}.msg.user .body{order:1}.msg.user .avatar{order:2;background:#8052ff22;color:#c4b2ff}.avatar{width:35px;height:35px;border-radius:50%;background:#ffffff12;display:grid;place-items:center;font-size:10px}.mirror:before{content:"";width:15px;height:15px;clip-path:polygon(0 0,100% 50%,0 100%);background:linear-gradient(145deg,#8052ff,#c08cff,#15846e)}.head{font-size:12px;font-weight:600;margin:8px 0 10px}.body{font-size:15px;line-height:1.68;color:#eee;white-space:pre-wrap}.note{margin-top:17px;padding:16px 18px;border-left:1px solid #ffb829;background:#ffb8290b;color:#d4d4d4;white-space:normal}.tag{display:block;color:#ffb829;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}.typing{display:inline-flex;gap:5px;padding:8px 0}.typing i{width:6px;height:6px;background:#888;border-radius:50%;animation:b 1s infinite}.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}.composer{padding:0 22px 22px}.input{max-width:850px;margin:auto;display:flex;gap:9px;align-items:flex-end;border:1px solid #ffffff1c;border-radius:25px;background:#0b0b0ef2;padding:8px 9px 8px 16px}.input textarea{flex:1;resize:none;max-height:130px;min-height:40px;padding:10px 0;background:none;border:0;outline:0;color:#fff;font-size:14px;font-family:inherit}.icon,.send{width:42px;height:42px;border-radius:50%;border:0;color:#fff;cursor:pointer}.icon{background:#ffffff0c;color:#aaa}.send{background:#8052ff;font-size:20px}.hint{max-width:850px;margin:7px auto 0;color:#555;font-size:10px;text-align:center}.memory{position:fixed;z-index:5;right:18px;top:82px;width:min(360px,calc(100% - 36px));max-height:calc(100% - 110px);overflow:auto;padding:20px;border:1px solid #ffffff18;border-radius:22px;background:#0a0a0ff5;box-shadow:0 24px 80px #000;display:none}.memory.open{display:block}.memory h3{margin:0 0 16px}.memoryCard{padding:14px;border:1px solid #ffffff12;border-radius:15px;margin:9px 0;color:#bbb;font-size:13px;line-height:1.5}.close{float:right;border:0;background:none;color:#888;cursor:pointer}canvas{position:fixed;inset:0;z-index:0;opacity:.85}@keyframes b{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}@keyframes in{from{opacity:0;transform:translateY(7px)}}@media(max-width:780px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:9;width:280px;inset:0 auto 0 0;transform:translateX(-100%);transition:.25s}.side.open{transform:none}.top{padding:0 14px}.chat{width:calc(100% - 28px);padding-top:22px}.hero h1{font-size:45px}.composer{padding:0 10px 12px}.desktop{display:none}.menu{display:inline-block!important}}.menu{display:none}</style></head><body><canvas id="c"></canvas><div class="app"><aside class="side" id="side"><div class="brand"><span class="mark"></span>ЗЕРКАЛО</div><button class="new" id="new">＋ Новый разговор</button><div class="label">Диалоги</div><div class="list" id="list"></div><div class="profile">Демо-пользователь<br><small>Память хранится в этом браузере</small></div></aside><main class="main"><header class="top"><div><button class="pill menu" id="menu">☰</button> <strong id="title">Новый разговор</strong></div><div class="topActions"><button class="pill desktop" id="memoryBtn">Память</button><button class="pill status">● Демо-режим</button></div></header><section class="scroll" id="scroll"><div class="chat" id="chat"></div></section><footer class="composer"><div class="input"><button class="icon" id="voice" title="Голосовой ввод">◉</button><textarea id="input" rows="1" placeholder="Расскажи, что сейчас происходит…"></textarea><button class="send" id="send">→</button></div><div class="hint">Интерактивная демонстрация: диалоги сохраняются локально, ответы генерируются встроенным сценарием.</div></footer></main></div><aside class="memory" id="memory"><button class="close" id="closeMemory">✕</button><h3>Память пользователя</h3><div id="memoryList"></div></aside><script>const $=s=>document.querySelector(s),storeKey='mirror_demo_v3';let state=JSON.parse(localStorage.getItem(storeKey)||'null')||{active:null,chats:[],memory:['Вам важно соединять деньги, смысл и пользу людям.','Перед публичными действиями часто появляется стремление сначала довести результат до идеала.','Вам легче работать как стратегу: быстро диагностировать ситуацию, предложить направление и передать реализацию.']};const save=()=>localStorage.setItem(storeKey,JSON.stringify(state));const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);function newChat(){let c={id:uid(),title:'Новый разговор',created:Date.now(),messages:[]};state.chats.unshift(c);state.active=c.id;save();render();$('#side').classList.remove('open');}function active(){return state.chats.find(c=>c.id===state.active)}function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function renderList(){$('#list').innerHTML=state.chats.map(c=>`<div class="item ${c.id===state.active?'active':''}" data-id="${c.id}">${esc(c.title)}<small>${new Date(c.created).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</small><button class="del" data-del="${c.id}">×</button></div>`).join('');document.querySelectorAll('[data-id]').forEach(el=>el.onclick=e=>{if(e.target.dataset.del)return;state.active=el.dataset.id;save();render();$('#side').classList.remove('open')});document.querySelectorAll('[data-del]').forEach(el=>el.onclick=e=>{e.stopPropagation();state.chats=state.chats.filter(c=>c.id!==el.dataset.del);if(state.active===el.dataset.del)state.active=state.chats[0]?.id||null;save();render()})}function hero(){return `<div class="hero"><div class="eyebrow">Разговор с собой</div><h1>Что сегодня стоит увидеть яснее?</h1><p>Опишите ситуацию. Демоверсия покажет, как «Зеркало» отделяет факты от интерпретаций, замечает повторяющиеся сценарии и предлагает следующий шаг.</p><div class="quick"><button>Я откладываю важное решение</button><button>Не понимаю, куда уходит энергия</button><button>Мне сложно начать разговор</button></div></div>`}function msgHTML(m){if(m.role==='user')return `<article class="msg user"><div class="body"><div class="head">Вы · ${m.time}</div>${esc(m.text)}</div><div class="avatar">ВИ</div></article>`;return `<article class="msg"><div class="avatar mirror"></div><div class="body"><div class="head">Зеркало · ${m.time}</div>${m.html}</div></article>`}function renderChat(){let c=active();$('#title').textContent=c?.title||'Новый разговор';$('#chat').innerHTML=(!c||!c.messages.length?hero():'')+(c?c.messages.map(msgHTML).join(''):'');document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{$('#input').value=b.textContent;send()});setTimeout(()=>$('#scroll').scrollTop=$('#scroll').scrollHeight,20)}function renderMemory(){$('#memoryList').innerHTML=state.memory.map(x=>`<div class="memoryCard">${esc(x)}</div>`).join('')}function render(){renderList();renderChat();renderMemory()}function clock(){return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}function makeReply(t){let s=t.toLowerCase(),intro,obs,step;if(/страх|боюсь|опасаюсь/.test(s)){intro='Похоже, рядом с самой задачей есть ещё одна нагрузка: страх, что результат станет оценкой вашей компетентности или ценности.';obs='Ранее перед заметными действиями уже появлялся похожий цикл: высокая планка → откладывание → потеря энергии.';step='Сделайте действие обратимым: отправьте черновик одному человеку и попросите ответить только на один вопрос.'}else if(/энерг|устал|сил/.test(s)){intro='В вашем описании слышится не только усталость, но и внутреннее сопротивление тому, как сейчас распределено внимание.';obs='Вы обычно чувствуете больше энергии там, где есть ясная диагностика, смысл и видимый результат, а не долгое операционное сопровождение.';step='Выпишите три текущих дела и отметьте одно, которое можно отменить, делегировать или сократить вдвое.'}else if(/отнош|разговор|жена|муж|партн/.test(s)){intro='Кажется, вы одновременно хотите быть услышанным и стараетесь заранее контролировать реакцию другого человека.';obs='В напряжённых разговорах желание быстро исправить ситуацию иногда мешает сначала назвать собственное чувство и потребность.';step='Начните фразой: «Мне важно не победить в этом разговоре, а понять друг друга. Сейчас я чувствую…»'}else if(/не знаю|решен|выбор|выбрать/.test(s)){intro='Сейчас вы, вероятно, пытаетесь найти решение без потерь, хотя часть напряжения связана именно с невозможностью сохранить все варианты.';obs='В сложных выборах вы часто ищете дополнительную уверенность, хотя направление уже частично понятно.';step='Сравните варианты не по принципу «где нет риска», а по вопросу: какой риск вы готовы осознанно принять?'}else{intro='Я слышу в вашем сообщении две части: фактическую ситуацию и значение, которое вы ей придаёте. Их полезно временно разделить.';obs='В вашей памяти повторяется стремление сначала получить полную ясность, а уже потом действовать. Иногда ясность появляется только после первого шага.';step='Запишите отдельно: 1) что точно произошло; 2) что вы предполагаете; 3) какое минимальное действие даст новые данные.'}return `${intro}<div class="note"><span class="tag">Наблюдение из памяти</span>${obs}</div><p>Это не окончательный вывод, а гипотеза для проверки. Что в ней откликается, а что кажется неверным?</p><div class="note"><span class="tag">Следующий шаг</span>${step}</div>`}async function send(){let box=$('#input'),t=box.value.trim();if(!t)return;let c=active();if(!c){newChat();c=active()}if(c.messages.length===0)c.title=t.length>34?t.slice(0,34)+'…':t;c.messages.push({role:'user',text:t,time:clock()});box.value='';save();render();let typing=document.createElement('article');typing.className='msg';typing.innerHTML='<div class="avatar mirror"></div><div class="body"><div class="head">Зеркало</div><span class="typing"><i></i><i></i><i></i></span></div>';$('#chat').appendChild(typing);$('#scroll').scrollTop=$('#scroll').scrollHeight;await new Promise(r=>setTimeout(r,900+Math.random()*900));typing.remove();let html=makeReply(t);c.messages.push({role:'assistant',html,time:clock()});if(c.messages.length===2&&t.length>45)state.memory.unshift('Недавняя тема: '+t.slice(0,90));state.memory=state.memory.slice(0,7);save();render()}$('#new').onclick=newChat;$('#send').onclick=send;$('#input').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};$('#input').oninput=e=>{e.target.style.height='40px';e.target.style.height=Math.min(e.target.scrollHeight,130)+'px'};$('#menu').onclick=()=>$('#side').classList.toggle('open');$('#memoryBtn').onclick=()=>$('#memory').classList.add('open');$('#closeMemory').onclick=()=>$('#memory').classList.remove('open');$('#voice').onclick=()=>{let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return alert('Голосовой ввод не поддерживается этим браузером.');let r=new SR;r.lang='ru-RU';r.onresult=e=>$('#input').value=e.results[0][0].transcript;r.start()};const c=$('#c'),x=c.getContext('2d');let p=[];function resize(){c.width=innerWidth;c.height=innerHeight;p=Array.from({length:240},()=>({x:innerWidth*(.55+Math.random()*.4),y:innerHeight*(.05+Math.random()*.48),s:.7+Math.random()*2,a:Math.random()*6.28,col:['#8052ff','#ffb829','#15846e','#b06aff','#5e8cff'][Math.random()*5|0]}))}function draw(t){x.clearRect(0,0,c.width,c.height);p.forEach(q=>{let xx=q.x+Math.sin(t/1200+q.a)*5,yy=q.y+Math.cos(t/1400+q.a)*5;x.strokeStyle=q.col;x.globalAlpha=.16+Math.random()*.3;x.beginPath();x.moveTo(xx,yy-q.s);x.lineTo(xx+q.s,yy+q.s);x.lineTo(xx-q.s,yy+q.s);x.closePath();x.stroke()});requestAnimationFrame(draw)}addEventListener('resize',resize);resize();draw(0);if(!state.chats.length)newChat();else render();</script></body></html>
